name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Build standalone exe (PyInstaller)
        run: python -m PyInstaller backend/codec_monitor.spec --noconfirm --distpath dist --workpath build

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss

      - name: Extract changelog section for this release
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $m = [regex]::Match($content, $pattern)
          $notes = if ($m.Success) { $m.Value.Trim() } else { "See CHANGELOG.md for details." }
          Write-Host "Matched: $($m.Success) - notes length: $($notes.Length)"
          $delimiter = "EOF_$([guid]::NewGuid().ToString('N'))"
          $block = "notes<<$delimiter" + "`n" + $notes + "`n" + $delimiter + "`n"
          # Add-Content's default encoding has been unreliable for the GITHUB_OUTPUT
          # parser on this runner image; write raw UTF-8 (no BOM) via .NET directly.
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, $block, $utf8NoBom)

      - name: Delete existing release for this tag (avoids stale-body reuse)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $headers = @{ Authorization = "token $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          try {
            $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" -Headers $headers -Method Get -ErrorAction Stop
            Invoke-RestMethod -Uri $rel.url -Headers $headers -Method Delete
            Write-Host "Deleted existing release id $($rel.id) for tag $tag"
          } catch {
            Write-Host "No existing release found for tag $tag - nothing to delete"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Codec Monitor.exe
            dist/CodecMonitor-Setup.exe
          body: ${{ steps.changelog.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
